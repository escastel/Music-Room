services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    restart: unless-stopped

  postgres:
      image: postgres:16-alpine
      env_file:
        - ./backend/.env
      volumes:
        - postgres_data:/var/lib/postgresql/data
      healthcheck:
        # Usamos comillas simples (') y doble asignación ($$) para las variables
        test: ["CMD-SHELL", 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
        interval: 5s
        timeout: 5s
        retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data: